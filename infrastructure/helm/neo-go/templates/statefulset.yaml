apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neo-go.fullname" . }}
  labels:
    app: neo-go
spec:
  serviceName: {{ include "neo-go.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: neo-go
  template:
    metadata:
      labels:
        app: neo-go
    spec:
      containers:
        - name: neo-go
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["neo-go", "node", "--config-path", "/config", "--relative-path"]
          ports:
            - name: p2p
              containerPort: {{ .Values.node.p2pPort }}
            - name: rpc
              containerPort: {{ .Values.node.rpcPort }}
            - name: metrics
              containerPort: {{ .Values.node.prometheusPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "neo-go.fullname" . }}-config
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
