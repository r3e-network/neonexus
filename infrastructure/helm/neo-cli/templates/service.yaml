apiVersion: v1
kind: Service
metadata:
  name: {{ include "neo-cli.fullname" . }}
  labels:
    app: neo-cli
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.node.p2pPort }}
      targetPort: p2p
      protocol: TCP
      name: p2p
    - port: {{ .Values.node.rpcPort }}
      targetPort: rpc
      protocol: TCP
      name: rpc
  selector:
    app: neo-cli
